name: Universal Discord Notifier

on:
  release:
    types: [published, created]
  pull_request:
    types: [opened, closed, reopened]
  issues:
    types: [opened, closed, reopened]
  workflow_run:
    workflows: ["Auto Build & Release Fish Slackware Package"]
    types: [completed]
  workflow_dispatch:

permissions:
  actions: read

jobs:
  notify_discord:
    runs-on: ubuntu-latest

    steps:
      # ---------------------------------------------------------
      # 1. Download release info artifact (workflow_run only)
      # ---------------------------------------------------------
      - name: Download release info artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v8
        with:
          name: release_info
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      # ---------------------------------------------------------
      # 2. Parse release info JSON
      # ---------------------------------------------------------
      - name: Read release info
        if: ${{ github.event_name == 'workflow_run' }}
        id: release_info
        run: |
          RELEASE_TAG=$(jq -r '.release_tag' release_info.json)
          RELEASE_NAME=$(jq -r '.release_name' release_info.json)
          NEW_RELEASE=$(jq -r '.new_release' release_info.json)

          echo "RELEASE_TAG=${RELEASE_TAG}" >> ${GITHUB_ENV}
          echo "RELEASE_NAME=${RELEASE_NAME}" >> ${GITHUB_ENV}
          echo "NEW_RELEASE=${NEW_RELEASE}" >> ${GITHUB_ENV}

      # ---------------------------------------------------------
      # 3. Build & send Discord embed
      # ---------------------------------------------------------
      - name: Send Discord Notification
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          EVENT: ${{ github.event_name }}
          ACTION: ${{ github.event.action || '' }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}

          # Release info
          RELEASE_URL: ${{ github.event.release.html_url || '' }}
          RELEASE_BODY: ${{ github.event.release.body || '' }}
          RELEASE_TAG: ${{ github.event.release.tag_name || env.RELEASE_TAG || '' }}
          RELEASE_NAME: ${{ github.event.release.name || env.RELEASE_NAME || '' }}
          NEW_RELEASE: ${{ github.event_name == 'release' && 'true' || env.NEW_RELEASE || 'false' }}

          # PR / Issue info
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_URL: ${{ github.event.pull_request.html_url || '' }}
          PR_BODY: ${{ github.event.pull_request.body || '' }}
          PR_MERGED: ${{ github.event.pull_request.merged || '' }}

          ISSUE_TITLE: ${{ github.event.issue.title || '' }}
          ISSUE_URL: ${{ github.event.issue.html_url || '' }}
          ISSUE_BODY: ${{ github.event.issue.body || '' }}

          # Workflow run info
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || '' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || '' }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url || '' }}
          WORKFLOW_STARTED: ${{ github.event.workflow_run.run_started_at || '' }}
          WORKFLOW_FINISHED: ${{ github.event.workflow_run.updated_at || '' }}
        run: |
          # -----------------------------------------------------
          # Determine event type
          # -----------------------------------------------------
          case "${EVENT}" in
            release)
              ICON="🚀"
              CONTENT="New Release Published"
              TITLE="${RELEASE_NAME:-Release ${RELEASE_TAG}}"
              URL="${RELEASE_URL}"
              BODY="${RELEASE_BODY}"
              COLOR=3447003
              ;;
            pull_request)
              URL="${PR_URL}"
              TITLE="${PR_TITLE}"
              BODY="${PR_BODY}"

              if [ "${ACTION}" = "opened" ]; then
                ICON="🔀"
                CONTENT="Pull Request Opened"
                COLOR=5763719
              elif [ "${ACTION}" = "closed" ] && [ "${PR_MERGED}" = "true" ]; then
                ICON="🎉"
                CONTENT="Pull Request Merged"
                COLOR=8311585
              else
                ICON="❌"
                CONTENT="Pull Request Closed"
                COLOR=10038562
              fi
              ;;
            issues)
              URL="${ISSUE_URL}"
              TITLE="${ISSUE_TITLE}"
              BODY="${ISSUE_BODY}"

              if [ "${ACTION}" = "opened" ]; then
                ICON="🐞"
                CONTENT="New Issue Opened"
                COLOR=16776960
              elif [ "${ACTION}" = "closed" ]; then
                ICON="✅"
                CONTENT="Issue Closed"
                COLOR=10038562
              else
                ICON="🌀"
                CONTENT="Issue Reopened"
                COLOR=9807270
              fi
              ;;
            workflow_run)
              URL="${WORKFLOW_URL:-https://github.com/${REPO}/actions}"
              TITLE="${WORKFLOW_NAME}"
              BODY="Workflow completed with conclusion: ${WORKFLOW_CONCLUSION}"

              if [ "${WORKFLOW_CONCLUSION}" = "success" ]; then
                ICON="✅"
                CONTENT="Workflow Succeeded"
                COLOR=5763719
              else
                ICON="❌"
                CONTENT="Workflow Failed"
                COLOR=10038562
              fi

              if [ "${NEW_RELEASE}" = "true" ]; then
                BODY="${BODY}"$'\n'"Built Version: ${RELEASE_TAG}"
                TITLE="${TITLE} — ${RELEASE_TAG}"
                CONTENT="Workflow Succeeded — New Release"
              fi
              ;;
            *)
              ICON="🧭"
              CONTENT="Manual Trigger"
              TITLE="Manual Trigger"
              URL="https://github.com/${REPO}"
              BODY="Workflow manually triggered by ${ACTOR}"
              COLOR=8421504
              ;;
          esac

          # -----------------------------------------------------
          # Compute workflow duration
          # -----------------------------------------------------
          DURATION=""
          if [ "${EVENT}" = "workflow_run" ] && [ -n "${WORKFLOW_STARTED}" ] && [ -n "${WORKFLOW_FINISHED}" ]; then
            START=$(date -d "${WORKFLOW_STARTED}" +%s)
            END=$(date -d "${WORKFLOW_FINISHED}" +%s)
            SECONDS=$((END - START))

            H=$((SECONDS / 3600))
            M=$(((SECONDS % 3600) / 60))
            S=$((SECONDS % 60))

            if [ ${H} -gt 0 ]; then
              DURATION="${H}h ${M}m ${S}s"
            elif [ ${M} -gt 0 ]; then
              DURATION="${M}m ${S}s"
            else
              DURATION="${S}s"
            fi
          fi

          # -----------------------------------------------------
          # Build JSON using jq (safe & correct)
          # -----------------------------------------------------
          JSON=$(jq -n \
            --arg content "${ICON} ${CONTENT}" \
            --arg title "${TITLE}" \
            --arg url "${URL}" \
            --arg desc "${BODY}" \
            --arg actor "${ACTOR}" \
            --arg repo "${REPO}" \
            --arg timestamp "$(date -u +"%Y-%m-%dT%H:%M:%SZ")" \
            --arg release_tag "${RELEASE_TAG}" \
            --arg release_name "${RELEASE_NAME}" \
            --arg event "${EVENT}" \
            --arg new_release "${NEW_RELEASE}" \
            --arg duration "${DURATION}" \
            --argjson color ${COLOR} \
            '
            {
              content: $content,
              embeds: [
                {
                  title: $title,
                  url: $url,
                  description: $desc,
                  color: $color,
                  timestamp: $timestamp,
                  fields: (
                    [
                      {name:"Repository", value:$repo, inline:true},
                      {name:"Actor", value:$actor, inline:true}
                    ]
                    +
                    (
                      ( ($event == "release") or ($new_release == "true") )
                      ? ([
                          {name:"Release Tag", value:$release_tag, inline:true},
                          {name:"Release Name", value:$release_name, inline:true}
                        ])
                      : []
                    )
                    +
                    (
                      ( ($event == "workflow_run") and ($duration != "") )
                      ? ([
                          {name:"Duration", value:$duration, inline:true}
                        ])
                      : []
                    )
                  )
                }
              ]
            }
            '
          )

          # -----------------------------------------------------
          # Send to Discord
          # -----------------------------------------------------
          curl -H "Content-Type: application/json" \
               -d "${JSON}" \
               "${WEBHOOK}"
